version: "3.1"

nlu:
  - intent: greet
    examples: |
      - hello
      - hi
      - hey
      - good morning
      - good afternoon
      - hi there
      - hello eco advisor
      - hey bot
      - can you help me
      - I need help planning a trip

  - intent: goodbye
    examples: |
      - bye
      - goodbye
      - see you
      - thanks bye
      - that is all
      - end the conversation
      - no more questions
      - talk later
      - I am done
      - finish

  - intent: start_trip_planning
