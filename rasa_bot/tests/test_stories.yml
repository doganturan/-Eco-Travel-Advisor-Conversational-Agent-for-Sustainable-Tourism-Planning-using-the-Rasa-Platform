version: "3.1"

stories:

  - story: test greeting flow
    steps:
      - intent: greet
      - action: utter_greet
      - action: utter_explain_purpose
      - action: utter_privacy_notice

  - story: test happy path eco trip planning
    steps:
      - intent: greet
      - action: utter_greet
      - action: utter_explain_purpose
      - action: utter_privacy_notice

      - intent: start_trip_planning
      - action: utter_ask_origin

      - intent: provide_origin
        entities:
          - origin: Berlin
      - slot_was_set:
          - origin: Berlin
      - action: utter_ask_destination

      - intent: provide_destination
        entities:
          - destination: Amsterdam
      - slot_was_set:
          - destination: Amsterdam
      - action: utter_ask_travel_dates

      - intent: provide_dates
        entities:
          - travel_date: next weekend
      - slot_was_set:
          - travel_dates: next weekend
      - action: utter_ask_budget

      - intent: provide_budget
        entities:
          - budget: 300 euros
      - slot_was_set:
          - budget: 300 euros
      - action: utter_ask_sustainability_preference

      - intent: provide_sustainability_preference
        entities:
          - sustainability_preference: high
      - slot_was_set:
          - sustainability_preference: high
      - action: utter_ask_transport_preference

      - intent: provide_transport_preference
        entities:
          - transport_preference: train
      - slot_was_set:
          - transport_preference: train
      - action: utter_recommendation_intro
      - action: action_recommend_transport
      - action: action_calculate_carbon_impact
      - action: action_rank_options
      - action: action_recommend_hotels
      - action: action_recommend_activities

  - story: test recommendation request
    steps:
      - intent: ask_recommendations
      - action: utter_recommendation_intro
      - action: action_recommend_transport
      - action: action_calculate_carbon_impact
      - action: action_rank_options
      - action: action_recommend_hotels
      - action: action_recommend_activities

  - story: test carbon impact request
    steps:
      - intent: ask_carbon_impact
      - action: action_calculate_carbon_impact

  - story: test carbon offset request
    steps:
      - intent: ask_carbon_offset
      - action: utter_carbon_offset_intro
      - action: action_carbon_offset_info

  - story: test trip summary request
    steps:
      - intent: ask_trip_summary
      - action: utter_trip_summary_intro
      - action: action_trip_summary

  - story: test human handover confirmation
    steps:
      - intent: request_human_handover
      - action: utter_handover_offer
      - intent: affirm
      - action: action_prepare_handover

  - story: test fallback repair
    steps:
      - intent: out_of_scope
      - action: action_default_fallback